<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Paso 1 - Verificar documento | Registro</title>
</head>
<body>
<main>
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">

            <!-- Cabecera -->
            <div class="text-center mb-4">
                <h2 class="fw-bold">Registro de usuario</h2>
                <p class="text-muted">Paso 1 de 2 — Verificar documento de identidad</p>
            </div>

            <!-- Indicador de pasos -->
            <div class="d-flex justify-content-center mb-4">
                <div class="d-flex align-items-center">
                    <span class="badge rounded-pill bg-primary px-3 py-2 fs-6">1</span>
                    <span class="ms-2 fw-semibold">Verificar documento</span>
                    <span class="mx-3 text-muted">&#8594;</span>
                    <span class="badge rounded-pill bg-secondary px-3 py-2 fs-6">2</span>
                    <span class="ms-2 text-muted">Datos personales</span>
                </div>
            </div>

            <!-- Alerta de error de verificación -->
            <div th:if="${errorVerificacion}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <strong>Error:</strong> <span th:text="${errorVerificacion}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
            </div>

            <!-- Formulario paso 1 -->
            <div class="card">
                <div class="card-body p-4">
                    <form th:action="@{/registro/verificar}" th:object="${verificarDto}" method="post">

                        <!-- Tipo de documento -->
                        <div class="mb-3">
                            <label for="tipoDocumento" class="form-label fw-semibold">
                                Tipo de documento <span class="text-danger">*</span>
                            </label>
                            <select id="tipoDocumento" th:field="*{tipoDocumento}"
                                    class="form-select"
                                    th:classappend="${#fields.hasErrors('tipoDocumento')} ? 'is-invalid'">
                                <option value="">-- Seleccione tipo --</option>
                                <option value="DNI_NIE">DNI/NIE</option>
                                <option value="OTRO">Otro</option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('tipoDocumento')}"
                                 th:errors="*{tipoDocumento}"></div>
                        </div>

                        <!-- Número de documento -->
                        <div class="mb-3">
                            <label for="documento" class="form-label fw-semibold">
                                Número de documento <span class="text-danger">*</span>
                            </label>
                            <input type="text" id="documento" th:field="*{documento}"
                                   class="form-control text-uppercase"
                                   placeholder="Ej: 12345678A"
                                   th:classappend="${#fields.hasErrors('documento')} ? 'is-invalid'"/>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('documento')}"
                                 th:errors="*{documento}"></div>
                        </div>

                        <!-- Centro -->
                        <div class="mb-4">
                            <label for="centroId" class="form-label fw-semibold">
                                Centro educativo <span class="text-danger">*</span>
                            </label>
                            <select id="centroId" th:field="*{centroId}"
                                    class="form-select"
                                    th:classappend="${#fields.hasErrors('centroId')} ? 'is-invalid'">
                                <option value="">-- Seleccione centro --</option>
                                <option th:each="centro : ${centros}"
                                        th:value="${centro.id}"
                                        th:text="${centro.name}">Centro</option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('centroId')}"
                                 th:errors="*{centroId}"></div>
                        </div>

                        <!-- Botón submit -->
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">
                                Continuar al paso 2 &rarr;
                            </button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</main>
</body>
</html>
